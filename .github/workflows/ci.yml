# This is a GitHub Actions workflow equivalent to the CircleCI configuration.
name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  say-hello:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.11.0

      - name: Install dependencies
        run: npm install

      - name: Echo Context
        run: |
          npx nx report
          node -p "process.stdout.isTTY"

      - name: Say hello
        run: npx nx echo
